services:
  postgres:
    image: postgres:18.1
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=homeeconomics-dev
      - POSTGRES_USER=homeeconomics
      - POSTGRES_PASSWORD=homeeconomics
    volumes:
      - postgres_dev_data:/var/lib/postgresql
    restart: always

volumes:
  postgres_dev_data:
